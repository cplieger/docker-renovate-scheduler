services:
  renovate:
    image: ghcr.io/cplieger/docker-renovate-scheduler:latest
    container_name: renovate
    restart: unless-stopped

    # Built-in scheduling (default): one run at startup for immediate
    # freshness, then every SCHED_INTERVAL. No external scheduler required.
    environment:
      LOG_LEVEL: "info"          # debug | info | warn | error
      LOG_FORMAT: "json"         # Renovate's own log format (for Loki/Alloy)
      SCHED_INTERVAL: "6h"       # built-in cadence (Go duration); "off" -> external
      SCHED_TIMEOUT: "1h"        # whole-run timeout for one `renovate` invocation

      # --- Renovate's own configuration (RENOVATE_*) — not wrapped by us ---
      RENOVATE_PLATFORM: "github"
      RENOVATE_AUTODISCOVER: "true"      # or set RENOVATE_REPOSITORIES
      RENOVATE_TOKEN: "${RENOVATE_TOKEN}"
      RENOVATE_GITHUB_COM_TOKEN: "${RENOVATE_GITHUB_COM_TOKEN}"
      # Resident-container cache reuse (git fetch, not clone):
      RENOVATE_PERSIST_REPO_DATA: "true"
      RENOVATE_REPOSITORY_CACHE: "enabled"

      # Running as a non-default UID (rootless)? The base image's containerbase
      # tool installer and the default Go/Node caches live under /opt/containerbase
      # and /home/ubuntu, owned by the image's built-in user (UID 12021). If you
      # override the container UID, on-demand `binarySource=install` tool installs
      # fail and gomod's `go mod tidy` can't write its cache, so go.sum is never
      # refreshed and Go dependency PRs fail CI with `missing go.sum entry`. In that
      # case bake the tools you need at build time (this image bakes Go) and use
      # them at runtime instead of installing on demand:
      #   RENOVATE_BINARY_SOURCE: "global"
      #   GOPATH: "/data/go"
      #   GOCACHE: "/data/.cache/go-build"
      #   # Renovate forwards only an env allowlist to artifact subprocesses
      #   # (GOPATH yes, GOCACHE no), so pass the cache paths through explicitly:
      #   RENOVATE_CUSTOM_ENVVARIABLES: '{"GOPATH":"/data/go","GOCACHE":"/data/.cache/go-build"}'

    # External scheduling variant: disable the built-in loop and let a central
    # scheduler drive each run by exec'ing the `run` subcommand. The advisory
    # lock on /tmp/.docker-renovate-scheduler.lock prevents overlapping runs
    # across the exec and the (now-idle) daemon.
    #   environment:
    #     SCHED_INTERVAL: "off"  # disabled | 0 also disable the built-in scheduler
    #   labels:                  # e.g. an Ofelia sibling on the same host
    #     ofelia.enabled: "true"
    #     ofelia.job-exec.renovate-run.schedule: "@every 6h"
    #     ofelia.job-exec.renovate-run.command: "docker-renovate-scheduler run"
    #     ofelia.job-exec.renovate-run.no-overlap: "true"

    volumes:
      - ./data:/data:rw          # RENOVATE_BASE_DIR — persist clones + caches
      # Optional: a Renovate config.js instead of RENOVATE_* env vars
      # - ./config.js:/usr/src/app/config.js:ro
