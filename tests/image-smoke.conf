# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Runs in external-trigger mode (SCHED_INTERVAL=off):
# runExternal() marks the health marker healthy on boot and idles, so no
# RENOVATE_TOKEN, repositories, or network are needed to reach "healthy". Waits
# for the container HEALTHCHECK to report healthy - proving the scheduler binary
# runs on the renovate/renovate base, the inherited base ENTRYPOINT sets up the
# environment and launches the daemon, RENOVATE_BASE_DIR is writable, and the
# file-marker probe works.
SMOKE_APP_NAME=renovate-scheduler
# Baked HEALTHCHECK is --interval=60s --start-period=30s; 150s covers the
# start-period plus two intervals on a cold boot.
SMOKE_TIMEOUT=150
SMOKE_RUN_ARGS="-e SCHED_INTERVAL=off"
